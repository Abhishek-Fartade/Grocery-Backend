# Server Configuration

server.port=${PORT:8080}

# MySQL Database Configuration

spring.datasource.url=jdbc:mysql://acela.proxy.rlwy.net:34173/railway?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=YOUR_RAILWAY_PASSWORD

# JPA Configuration

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration

jwt.secret=supermarketSecretKeyForJWTTokenGeneration2024ThisIsAVeryLongSecretKeyForSecurity
jwt.expiration=86400000

# Logging

logging.level.com.supermarket=DEBUG
logging.level.org.springframework.security=DEBUG
